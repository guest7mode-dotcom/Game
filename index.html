<!DOCTYPE html>
<html>
<head>
  <title>AI Movement Test</title>
  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Load sprite from GitHub
const sprite = new Image();
sprite.src = "YOUR_RAW_GITHUB_LINK_HERE";

// AI character
let unit = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  speed: 1.5,
  targetX: 0,
  targetY: 0,
  timer: 0
};

// Pick random target
function newTarget() {
  unit.targetX = Math.random() * canvas.width;
  unit.targetY = Math.random() * canvas.height;
}

// AI update
function updateAI() {
  let dx = unit.targetX - unit.x;
  let dy = unit.targetY - unit.y;

  let dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < 5) {
    newTarget();
  } else {
    unit.x += (dx / dist) * unit.speed;
    unit.y += (dy / dist) * unit.speed;
  }
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (sprite.complete) {
    ctx.drawImage(sprite, unit.x, unit.y, 48, 48);
  }
}

// Game loop
function loop() {
  updateAI();
  draw();
  requestAnimationFrame(loop);
}

// start
newTarget();
loop();
</script>

</body>
</html>
